version: '3.8'

services:
  postgres:
    image: postgres:15
    env_file:
      - .env

  airflow-init:
    image: apache/airflow:2.8.0
    env_file:
      - .env
    command: airflow db init

  webserver:
    image: apache/airflow:2.8.0
    command: webserver
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres

  scheduler:
    image: apache/airflow:2.8.0
    command: scheduler
    env_file:
      - .env

  triggerer:
    image: apache/airflow:2.8.0
    command: triggerer