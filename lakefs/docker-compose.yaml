version: '3.8'

services:
  postgres:
    image: postgres:15
    env_file:
      - .env

  minio:
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password

  lakefs:
    image: treeverse/lakefs
    depends_on:
      - postgres
      - minio
    ports:
      - "8000:8000"